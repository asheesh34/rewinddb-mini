server:
  port: 8080

spring:
  application:
    name: rewinddb-mini

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rewinddb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      indent-output: true

logging:
  level:
    root: INFO
    com.rewinddb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  secret: ${JWT_SECRET:ChangeThisToAVeryLongRandomSecretKeyAtLeast32CharactersLong123456789}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  encryption:
    secret: ${APP_ENCRYPTION_SECRET:RewindDbDefaultDevEncryptionKey!}
  listener:
    enabled: true
  rollback:
    batch-size: 100