server:
  port: 8080

spring:
  application:
    name: rewinddb-mini

  datasource:
    url: jdbc:postgresql://localhost:5432/rewinddb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      indent-output: true

logging:
  level:
    root: INFO
    com.rewinddb: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

jwt:
  secret: ChangeThisToAVeryLongRandomSecretKeyAtLeast32CharactersLong123456789
  expiration: 86400000

app:
  encryption:
    secret: ChangeThisToA32CharacterAESKey12345
  listener:
    enabled: true
  rollback:
    batch-size: 100
